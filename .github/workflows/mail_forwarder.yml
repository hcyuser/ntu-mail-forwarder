name: General Mail Forwarder

on:
  schedule:
    - cron: '0 3 * * *'  # Runs daily at 03:00 UTC (approx. 11:00 Taiwan time)
  workflow_dispatch:      # Supports manual trigger via GitHub Web UI

# Explicitly define minimal permissions to prevent token misuse
permissions:
  contents: read

jobs:
  run-forwarder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Mail Forwarder Script
        env:
          MAIL_ACCOUNTS: ${{ secrets.MAIL_ACCOUNTS }}
          FORWARD_TO: ${{ secrets.FORWARD_TO }}
        run: python mail_forwarder.py
